name: Release Charts

on:
  push:
    tags:
      - harmony-chart-*

jobs:
  release:
    # depending on default permission settings for your org (contents being read-only or read-write for workloads), you will have to add permissions
    # see: https://docs.github.com/en/actions/security-guides/automatic-token-authentication#modifying-the-permissions-for-the-github_token
    permissions:
      contents: write # to push chart release and create a release (helm/chart-releaser-action)
      packages: write # to push OCI charts to GHCR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Install Helm
        uses: azure/setup-helm@v3.5
        with:
          version: v3.12.3

      - name: Validate chart tag version
        run: |
          TAG="${GITHUB_REF_NAME}"
          CHART_VERSION="${TAG#harmony-chart-}"
          FILE_VERSION="$(helm show chart charts/harmony-chart | awk '/^version:/ { print $2 }')"

          if [ "${CHART_VERSION}" != "${FILE_VERSION}" ]; then
            echo "Tag version (${CHART_VERSION}) does not match Chart.yaml version (${FILE_VERSION})."
            exit 1
          fi

          echo "CHART_VERSION=${CHART_VERSION}" >> "$GITHUB_ENV"

      - name: Package chart for OCI
        run: |
          helm dependency update charts/harmony-chart
          mkdir -p .release-packages
          helm package charts/harmony-chart --destination .release-packages

      - name: Login to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Push chart to GHCR (OCI)
        run: |
          helm push \
            ".release-packages/harmony-chart-${CHART_VERSION}.tgz" \
            "oci://ghcr.io/${{ github.repository_owner }}/charts"

      # The OCI registries are bypassed since helm repo subcommands are not supported.
      # More details in https://helm.sh/docs/topics/registries/
      - name: Add dependency repositories via Helm (bypassing OCI repositories)
        run: |
          for dir in $(ls -d charts/*/); do
            helm dependency list $dir 2> /dev/null | tail +2 | head -n -1 | sed '/oci:\/\//d' | awk '{ print "helm repo add " $1 " " $3 }' | while read cmd; do $cmd; done
          done

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@v1.6.0
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
